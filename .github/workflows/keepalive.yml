# Supabase free tier pauses projects it thinks are inactive — and its detector
# watches database/API-gateway traffic, which Edge Function calls don't
# generate. This daily ping keeps The Nightstand registering as active.
# Same pattern as cbtomlinson/tend. (If this workflow itself fails, GitHub
# emails — that's the signal to look.)
name: Supabase keep-alive

on:
  schedule:
    - cron: '30 13 * * *' # daily, 13:30 UTC (~8:30–9:30 AM Eastern; offset from Tend's)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth health (API-gateway traffic the pause detector counts)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://qtinnaugpjhjsdmnltip.supabase.co/auth/v1/health" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "auth health: $code"
          [ "$code" = "200" ] || exit 1
