# Supabase free tier pauses projects after ~7 quiet days. LESSON LEARNED
# (paused 2026-07-17 despite nine green days of auth/v1/health pings): health
# endpoints do NOT reset the inactivity clock — the detector counts real
# database/API traffic. So the daily ping is now an actual PostgREST table
# query (RLS returns [] — no data exposed, but Postgres does real work).
# Auth health rides along as a liveness alarm: if the project pauses anyway,
# both steps fail and GitHub emails — that's the signal to go look.
name: Supabase keep-alive

on:
  schedule:
    - cron: '30 13 * * *' # daily, 13:30 UTC (~8:30–9:30 AM Eastern)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query the database through PostgREST (the traffic that counts)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://qtinnaugpjhjsdmnltip.supabase.co/rest/v1/waitlist?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "rest query: $code"
          [ "$code" = "200" ] || exit 1
      - name: Auth health (liveness alarm)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://qtinnaugpjhjsdmnltip.supabase.co/auth/v1/health" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "auth health: $code"
          [ "$code" = "200" ] || exit 1
